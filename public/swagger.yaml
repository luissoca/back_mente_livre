    description: 'Endpoints para gestión de terapeutas'
  -
    name: 'Therapist Photos'
    description: 'Gestión de fotos de terapeutas'
  -
    name: 'Therapist Pricing'
    description: 'Gestión de precios de terapeutas'
  -
    name: Users
    description: 'Endpoints para gestión de usuarios'
  -
    name: 'User Roles'
